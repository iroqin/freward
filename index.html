<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Reward Keluarga</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" class="screen active">
        <h2>Masuk</h2>
        <div id="user-selection" class="card-grid">
            </div>
        <div id="pin-section" class="hidden">
            <h3 id="login-name"></h3>
            <input type="password" id="pin-input" placeholder="Masukkan PIN 4 Digit" maxlength="4">
            <button onclick="verifyPin()">Masuk</button>
            <button class="secondary" onclick="resetLogin()">Batal</button>
        </div>
    </div>

    <div id="main-screen" class="screen hidden">
        <header>
            <h2 id="welcome-text">Halo</h2>
            <button class="secondary" onclick="logout()">Keluar</button>
        </header>

        <div id="admin-view" class="hidden">
            <h3>Persetujuan Tugas Tertunda</h3>
            <div id="pending-tasks-list"></div>
        </div>

        <div id="member-view" class="hidden">
            <div class="balance-card">
                <h3>Saldo Poin Kamu</h3>
                <h1 id="user-points">0</h1>
            </div>
            
            <h3>Tugas Tersedia</h3>
            <div id="tasks-list" class="card-grid"></div>

            <h3>Katalog Hadiah</h3>
            <div id="rewards-list" class="card-grid"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Reward Keluarga</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" class="screen active">
        <h2>Masuk</h2>
        <div id="user-selection" class="card-grid"></div>
        <div id="pin-section" class="hidden">
            <h3 id="login-name"></h3>
            <input type="password" id="pin-input" placeholder="Masukkan PIN 4 Digit" maxlength="4">
            <button onclick="verifyPin()">Masuk</button>
            <button class="secondary" onclick="resetLogin()">Batal</button>
        </div>
    </div>

    <div id="main-screen" class="screen hidden">
        <header>
            <h2 id="welcome-text">Halo</h2>
            <button class="secondary" onclick="logout()">Keluar</button>
        </header>

        <div id="admin-view" class="hidden">
            <div class="admin-nav">
                <button id="btn-tab-approval" onclick="switchAdminTab('approval')">Persetujuan</button>
                <button id="btn-tab-manage" class="secondary" onclick="switchAdminTab('manage')">Kelola Data</button>
            </div>

            <div id="admin-approval-section">
                <h3>Tugas Menunggu Persetujuan</h3>
                <div id="pending-tasks-list" class="card-grid"></div>
            </div>

            <div id="admin-manage-section" class="hidden">
                <h3>Tambah Tugas Baru</h3>
                <div class="card-grid" style="margin-bottom:20px;">
                    <input type="text" id="new-task-name" placeholder="Nama Tugas">
                    <input type="number" id="new-task-points" placeholder="Poin">
                    <input type="text" id="new-task-category" placeholder="Kategori (mis: A - Kamar)">
                    <button onclick="addNewTask()">+ Tambah Tugas</button>
                </div>

                <h3>Tambah Hadiah Baru</h3>
                <div class="card-grid" style="margin-bottom:20px;">
                    <input type="text" id="new-reward-name" placeholder="Nama Hadiah">
                    <input type="number" id="new-reward-points" placeholder="Harga Poin">
                    <input type="text" id="new-reward-tier" placeholder="Tier (mis: Tier 1)">
                    <button onclick="addNewReward()">+ Tambah Hadiah</button>
                </div>

                <h3>Katalog Saat Ini (Edit/Hapus)</h3>
                <div id="admin-catalog-list"></div>
            </div>
        </div>

        <div id="member-view" class="hidden">
            <div class="balance-card">
                <h3>Saldo Poin Kamu</h3>
                <h1 id="user-points">0</h1>
            </div>
            
            <h3>Tugas Tersedia</h3>
            <div id="tasks-list"></div>

            <h3 style="margin-top: 30px;">Katalog Hadiah</h3>
            <div id="rewards-list"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
